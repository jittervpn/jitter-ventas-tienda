<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShockTV — Resultados de fútbol en vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0E14;--card:#11151F;--card2:#161B27;--border:#222838;
  --text:#F4F6FB;--muted:#8A93A6;--accent:#FF3D5A;--accent2:#22D3A8;
  --live:#FF3D5A;--gold:#F5B843;--blue:#3B82F6;--r:14px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
header{background:#0E1119;border-bottom:1px solid var(--border);padding:0 1.25rem;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:7px;}
.logo .dot{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:10px;}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(255,61,90,0.12);border:1px solid rgba(255,61,90,0.3);color:#FF8095;padding:5px 12px;border-radius:50px;font-size:11px;font-weight:600;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.search-box{display:none;}
@media(min-width:640px){.search-box{display:flex;align-items:center;background:var(--card2);border:1px solid var(--border);border-radius:50px;padding:6px 14px;gap:8px;width:220px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%;}}

.tabs-row{display:flex;gap:6px;padding:0.85rem 1.25rem;overflow-x:auto;background:#0E1119;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;}
.tabs-row::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;font-size:12.5px;font-weight:500;color:var(--muted);background:var(--card2);border:1px solid var(--border);padding:7px 16px;border-radius:50px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.tab:hover{border-color:#3a4357;}
.tab.active{background:var(--text);color:#0B0E14;border-color:var(--text);}

main{max-width:760px;margin:0 auto;padding:1.25rem;}

.league-filters{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.league-filters::-webkit-scrollbar{display:none;}
.lf{flex-shrink:0;font-size:11.5px;color:var(--muted);background:var(--card);border:1px solid var(--border);padding:5px 12px;border-radius:50px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.lf.active{background:rgba(34,211,168,0.1);color:var(--accent2);border-color:rgba(34,211,168,0.35);}

.status-msg{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:13px;display:none;}
.status-msg.show{display:block;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg)}}

.league-group{margin-bottom:1.5rem;}
.league-head{display:flex;align-items:center;gap:8px;margin-bottom:0.6rem;padding:0 2px;}
.league-head img{width:18px;height:18px;border-radius:4px;object-fit:contain;background:var(--card2);}
.league-head h3{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}

.match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:0.9rem 1.1rem;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.match-card:hover{border-color:#39435a;transform:translateY(-1px);}
.match-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.match-status{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:50px;}
.status-live{background:rgba(255,61,90,0.15);color:#FF8095;}
.status-ft{background:var(--card2);color:var(--muted);}
.status-ns{background:rgba(59,130,246,0.12);color:#7DA8F5;}
.match-date{font-size:10.5px;color:var(--muted);}

.teams-row{display:flex;align-items:center;gap:10px;}
.team-col{flex:1;display:flex;align-items:center;gap:9px;min-width:0;}
.team-col.away{flex-direction:row-reverse;text-align:right;}
.crest{width:26px;height:26px;border-radius:6px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;object-fit:contain;}
.team-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.score-col{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:54px;}
.score-num{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;}
.score-vs{font-size:12px;color:var(--muted);font-weight:500;}
.time-text{font-size:13px;font-weight:600;color:var(--text);}

.standings-table{width:100%;border-collapse:collapse;font-size:12px;}
.standings-table th{text-align:left;color:var(--muted);font-weight:500;padding:8px 6px;font-size:10.5px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.standings-table td{padding:8px 6px;border-bottom:1px solid var(--border);}
.standings-table tr:last-child td{border-bottom:none;}
.pos-cell{display:flex;align-items:center;gap:8px;}
.pos-num{width:18px;text-align:center;font-weight:600;color:var(--muted);}
.team-cell{display:flex;align-items:center;gap:8px;}
.team-cell img{width:18px;height:18px;border-radius:4px;object-fit:contain;}
.num-cell{text-align:center;color:var(--muted);}
.pts-cell{text-align:center;font-weight:700;color:var(--text);}

footer{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:1rem;}
footer strong{color:var(--text);}

.refresh-fab{position:fixed;bottom:1.5rem;right:1.5rem;width:46px;height:46px;border-radius:50%;background:var(--accent2);color:#0B0E14;border:none;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 4px 16px rgba(34,211,168,0.3);z-index:50;}
.refresh-fab.spinning svg{animation:spin 0.7s linear infinite;}

.wc-banner{background:linear-gradient(135deg,#0B3D2E 0%,#0E1119 100%);border:1px solid rgba(34,211,168,0.25);border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1rem;}
.wc-banner-icon{font-size:2.2rem;flex-shrink:0;}
.wc-banner h2{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:3px;}
.wc-banner p{font-size:11.5px;color:var(--muted);line-height:1.5;}
.wc-host-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.wc-chip{font-size:10.5px;background:rgba(34,211,168,0.1);border:1px solid rgba(34,211,168,0.25);color:var(--accent2);padding:2px 9px;border-radius:50px;}
.wc-group-head{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.5px;margin:1.1rem 0 0.6rem;}
</style>
</head>
<body>

<header>
  <div class="logo">📡 Shock<span class="dot">TV</span></div>
  <div class="header-right">
    <div class="search-box">
      <span style="font-size:13px;">🔍</span>
      <input type="text" id="teamSearch" placeholder="Buscar equipo...">
    </div>
    <div class="live-pill"><div class="live-dot"></div> EN VIVO</div>
  </div>
</header>

<div class="tabs-row">
  <div class="tab active" data-tab="worldcup">🏆 Mundial 2026</div>
  <div class="tab" data-tab="live">En vivo</div>
  <div class="tab" data-tab="today">Hoy</div>
  <div class="tab" data-tab="standings">Posiciones</div>
</div>

<main>
  <div class="league-filters" id="leagueFilters" style="display:none;">
    <div class="lf active" data-league="all">🌍 Todas</div>
    <div class="lf" data-league="4328">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</div>
    <div class="lf" data-league="4335">🇪🇸 LaLiga</div>
    <div class="lf" data-league="4480">🇦🇷 Liga Arg.</div>
    <div class="lf" data-league="4331">🇩🇪 Bundesliga</div>
    <div class="lf" data-league="4332">🇮🇹 Serie A</div>
    <div class="lf" data-league="4334">🇫🇷 Ligue 1</div>
    <div class="lf" data-league="4480">🇧🇷 Brasileirão</div>
  </div>

  <div id="content"></div>

  <div class="status-msg" id="statusMsg">
    <div class="spinner"></div>
    <p>Cargando partidos...</p>
  </div>
</main>

<button class="refresh-fab" id="refreshBtn" title="Actualizar">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
</button>

<footer><strong>ShockTV</strong> · Resultados y estadísticas de fútbol en vivo · Datos provistos por TheSportsDB</footer>

<script>
const API_KEY = '123';
const BASE = 'https://www.thesportsdb.com/api/v1/json/' + API_KEY;

const LEAGUE_NAMES = {
  '4328':'Premier League','4335':'LaLiga','4331':'Bundesliga',
  '4332':'Serie A','4334':'Ligue 1','4480':'Liga Profesional Argentina'
};
const WORLD_CUP_ID = '4429';
const WORLD_CUP_SEASON = '2025-2026';

let currentTab = 'worldcup';
let currentLeague = 'all';

function setStatus(show, text){
  const el = document.getElementById('statusMsg');
  el.classList.toggle('show', show);
  if(text) el.querySelector('p').textContent = text;
}

function crestImg(url, fallback){
  if(url) return `<img class="crest" src="${url}" alt="" onerror="this.style.display='none'">`;
  return `<div class="crest">${fallback}</div>`;
}

async function fetchJSON(url){
  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  }catch(e){
    console.error('Error fetching', url, e);
    return null;
  }
}

async function loadLive(){
  setStatus(true, 'Buscando partidos en vivo...');
  document.getElementById('content').innerHTML = '';

  const leagues = currentLeague === 'all' ? Object.keys(LEAGUE_NAMES) : [currentLeague];
  let allEvents = [];

  for(const lid of leagues){
    const data = await fetchJSON(`${BASE}/eventsnextleague.php?id=${lid}`);
    if(data && data.events){
      allEvents = allEvents.concat(data.events.map(e => ({...e, _league: lid})));
    }
  }

  setStatus(false);

  if(!allEvents.length){
    document.getElementById('content').innerHTML = `<div class="status-msg show"><p>⚽ No hay partidos en vivo en este momento.<br><br>Probá la pestaña "Hoy" para ver los próximos partidos.</p></div>`;
    return;
  }

  renderMatches(allEvents, 'live');
}

async function loadToday(){
  setStatus(true, 'Cargando partidos de hoy...');
  document.getElementById('content').innerHTML = '';

  const today = new Date().toISOString().split('T')[0];
  const leagues = currentLeague === 'all' ? Object.keys(LEAGUE_NAMES) : [currentLeague];
  let allEvents = [];

  for(const lid of leagues){
    const data = await fetchJSON(`${BASE}/eventsday.php?d=${today}&l=${LEAGUE_NAMES[lid].replace(/ /g,'_')}`);
    if(data && data.events){
      allEvents = allEvents.concat(data.events.map(e => ({...e, _league: lid})));
    }
  }

  if(!allEvents.length){
    for(const lid of leagues){
      const data = await fetchJSON(`${BASE}/eventsnextleague.php?id=${lid}`);
      if(data && data.events){
        allEvents = allEvents.concat(data.events.slice(0,5).map(e => ({...e, _league: lid})));
      }
    }
  }

  setStatus(false);

  if(!allEvents.length){
    document.getElementById('content').innerHTML = `<div class="status-msg show"><p>No se encontraron partidos. Intentá con otra liga.</p></div>`;
    return;
  }

  renderMatches(allEvents, 'today');
}

function renderMatches(events, mode){
  const grouped = {};
  events.forEach(e => {
    const lid = e._league;
    if(!grouped[lid]) grouped[lid] = [];
    grouped[lid].push(e);
  });

  let html = '';
  for(const lid of Object.keys(grouped)){
    html += `<div class="league-group">
      <div class="league-head"><h3>${LEAGUE_NAMES[lid] || 'Liga'}</h3></div>`;

    grouped[lid].forEach(e => {
      const homeScore = e.intHomeScore !== null && e.intHomeScore !== undefined ? e.intHomeScore : null;
      const awayScore = e.intAwayScore !== null && e.intAwayScore !== undefined ? e.intAwayScore : null;
      const hasScore = homeScore !== null && awayScore !== null;
      const status = e.strStatus || '';
      const isLive = ['1H','2H','HT','LIVE'].some(s => status.toUpperCase().includes(s));
      const isFT = status.toUpperCase().includes('FT') || status.toUpperCase().includes('MATCH FINISHED');

      let statusBadge = '';
      if(isLive) statusBadge = `<span class="match-status status-live">● ${status || 'EN VIVO'}</span>`;
      else if(isFT) statusBadge = `<span class="match-status status-ft">FINALIZADO</span>`;
      else statusBadge = `<span class="match-status status-ns">PROGRAMADO</span>`;

      const dateStr = e.dateEvent || '';
      const timeStr = e.strTime ? e.strTime.slice(0,5) : '';

      html += `
        <div class="match-card">
          <div class="match-top">
            ${statusBadge}
            <span class="match-date">${dateStr}${timeStr ? ' · ' + timeStr : ''}</span>
          </div>
          <div class="teams-row">
            <div class="team-col">
              ${crestImg(e.strHomeTeamBadge, (e.strHomeTeam||'?').slice(0,2).toUpperCase())}
              <span class="team-name">${e.strHomeTeam || 'Equipo local'}</span>
            </div>
            <div class="score-col">
              ${hasScore
                ? `<div class="score-num">${homeScore} - ${awayScore}</div>`
                : `<div class="time-text">${timeStr || 'vs'}</div>`}
            </div>
            <div class="team-col away">
              ${crestImg(e.strAwayTeamBadge, (e.strAwayTeam||'?').slice(0,2).toUpperCase())}
              <span class="team-name">${e.strAwayTeam || 'Equipo visitante'}</span>
            </div>
          </div>
        </div>`;
    });

    html += `</div>`;
  }

  document.getElementById('content').innerHTML = html;
}

async function loadStandings(){
  setStatus(true, 'Cargando tabla de posiciones...');
  document.getElementById('content').innerHTML = '';

  const lid = currentLeague === 'all' ? '4328' : currentLeague;
  const season = '2025-2026';
  const data = await fetchJSON(`${BASE}/lookuptable.php?l=${lid}&s=${season}`);

  setStatus(false);

  if(!data || !data.table){
    document.getElementById('content').innerHTML = `<div class="status-msg show"><p>No hay tabla de posiciones disponible para esta liga todavía.</p></div>`;
    return;
  }

  let rows = data.table.map(t => `
    <tr>
      <td><div class="pos-cell"><span class="pos-num">${t.intRank}</span></div></td>
      <td><div class="team-cell">${t.strBadge ? `<img src="${t.strBadge}" alt="" onerror="this.style.display='none'">` : ''}<span>${t.strTeam}</span></div></td>
      <td class="num-cell">${t.intPlayed}</td>
      <td class="num-cell">${t.intWin}</td>
      <td class="num-cell">${t.intDraw}</td>
      <td class="num-cell">${t.intLoss}</td>
      <td class="pts-cell">${t.intPoints}</td>
    </tr>`).join('');

  document.getElementById('content').innerHTML = `
    <table class="standings-table">
      <thead>
        <tr><th>#</th><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>Pts</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function loadWorldCup(){
  setStatus(true, 'Cargando datos del Mundial 2026...');
  document.getElementById('content').innerHTML = '';
  document.getElementById('leagueFilters').style.display = 'none';

  const [pastData, nextData, tableData] = await Promise.all([
    fetchJSON(`${BASE}/eventspastleague.php?id=${WORLD_CUP_ID}`),
    fetchJSON(`${BASE}/eventsnextleague.php?id=${WORLD_CUP_ID}`),
    fetchJSON(`${BASE}/lookuptable.php?l=${WORLD_CUP_ID}&s=${WORLD_CUP_SEASON}`)
  ]);

  setStatus(false);

  let html = `
    <div class="wc-banner">
      <div class="wc-banner-icon">🏆</div>
      <div>
        <h2>FIFA World Cup 2026</h2>
        <p>11 de junio – 19 de julio · 48 selecciones · 16 estadios</p>
        <div class="wc-host-chips">
          <span class="wc-chip">🇺🇸 Estados Unidos</span>
          <span class="wc-chip">🇲🇽 México</span>
          <span class="wc-chip">🇨🇦 Canadá</span>
        </div>
      </div>
    </div>`;

  const liveOrRecent = (pastData && pastData.events) ? pastData.events.slice(-6).reverse() : [];
  const upcoming = (nextData && nextData.events) ? nextData.events.slice(0, 8) : [];

  if(upcoming.length){
    html += `<div class="wc-group-head">⏭ Próximos partidos</div>`;
    upcoming.forEach(e => { html += matchCardHTML(e); });
  }

  if(liveOrRecent.length){
    html += `<div class="wc-group-head">📅 Resultados recientes</div>`;
    liveOrRecent.forEach(e => { html += matchCardHTML(e); });
  }

  if(tableData && tableData.table && tableData.table.length){
    html += `<div class="wc-group-head">📊 Tabla general</div>
      <table class="standings-table">
        <thead><tr><th>#</th><th>Selección</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>Pts</th></tr></thead>
        <tbody>${tableData.table.map(t => `
          <tr>
            <td><div class="pos-cell"><span class="pos-num">${t.intRank}</span></div></td>
            <td><div class="team-cell">${t.strBadge ? `<img src="${t.strBadge}" alt="" onerror="this.style.display='none'">` : ''}<span>${t.strTeam}</span></div></td>
            <td class="num-cell">${t.intPlayed}</td>
            <td class="num-cell">${t.intWin}</td>
            <td class="num-cell">${t.intDraw}</td>
            <td class="num-cell">${t.intLoss}</td>
            <td class="pts-cell">${t.intPoints}</td>
          </tr>`).join('')}</tbody>
      </table>`;
  }

  if(!upcoming.length && !liveOrRecent.length && !(tableData && tableData.table && tableData.table.length)){
    html += `<div class="status-msg show"><p>⚽ Los datos del Mundial 2026 todavía no están completos en la base de datos.<br><br>Probá de nuevo más cerca de la fecha de inicio del torneo.</p></div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function matchCardHTML(e){
  const homeScore = e.intHomeScore !== null && e.intHomeScore !== undefined ? e.intHomeScore : null;
  const awayScore = e.intAwayScore !== null && e.intAwayScore !== undefined ? e.intAwayScore : null;
  const hasScore = homeScore !== null && awayScore !== null;
  const status = e.strStatus || '';
  const isLive = ['1H','2H','HT','LIVE'].some(s => status.toUpperCase().includes(s));
  const isFT = status.toUpperCase().includes('FT') || status.toUpperCase().includes('MATCH FINISHED');

  let statusBadge = '';
  if(isLive) statusBadge = `<span class="match-status status-live">● ${status || 'EN VIVO'}</span>`;
  else if(isFT || hasScore) statusBadge = `<span class="match-status status-ft">FINALIZADO</span>`;
  else statusBadge = `<span class="match-status status-ns">PROGRAMADO</span>`;

  const dateStr = e.dateEvent || '';
  const timeStr = e.strTime ? e.strTime.slice(0,5) : '';

  return `
    <div class="match-card">
      <div class="match-top">
        ${statusBadge}
        <span class="match-date">${dateStr}${timeStr ? ' · ' + timeStr : ''}</span>
      </div>
      <div class="teams-row">
        <div class="team-col">
          ${crestImg(e.strHomeTeamBadge, (e.strHomeTeam||'?').slice(0,2).toUpperCase())}
          <span class="team-name">${e.strHomeTeam || 'Equipo'}</span>
        </div>
        <div class="score-col">
          ${hasScore
            ? `<div class="score-num">${homeScore} - ${awayScore}</div>`
            : `<div class="time-text">${timeStr || 'vs'}</div>`}
        </div>
        <div class="team-col away">
          ${crestImg(e.strAwayTeamBadge, (e.strAwayTeam||'?').slice(0,2).toUpperCase())}
          <span class="team-name">${e.strAwayTeam || 'Equipo'}</span>
        </div>
      </div>
    </div>`;
}

function loadCurrentTab(){
  if(currentTab === 'worldcup') loadWorldCup();
  else if(currentTab === 'live') loadLive();
  else if(currentTab === 'today') loadToday();
  else if(currentTab === 'standings') loadStandings();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    document.getElementById('leagueFilters').style.display = currentTab === 'worldcup' ? 'none' : 'flex';
    loadCurrentTab();
  });
});

document.querySelectorAll('.lf').forEach(lf => {
  lf.addEventListener('click', () => {
    document.querySelectorAll('.lf').forEach(l => l.classList.remove('active'));
    lf.classList.add('active');
    currentLeague = lf.dataset.league;
    loadCurrentTab();
  });
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  loadCurrentTab();
  setTimeout(() => btn.classList.remove('spinning'), 800);
});

loadCurrentTab();
setInterval(() => { if(currentTab === 'live' || currentTab === 'worldcup') loadCurrentTab(); }, 60000);
</script>
</body>
</html>
